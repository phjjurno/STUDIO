<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 720"
     width="1280" height="720"
     role="img" aria-labelledby="title desc">
  <title id="title">Vintage Turntable — animation-ready layered SVG</title>
  <desc id="desc">Layered vector turntable with independently rotatable record and pivoting, liftable tonearm. Center label is blank for track titles.</desc>

  <defs>
    <!-- Warm walnut body -->
    <linearGradient id="woodBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c1c0f"/>
      <stop offset=".35" stop-color="#714126"/>
      <stop offset=".68" stop-color="#4e2818"/>
      <stop offset="1" stop-color="#2a130c"/>
    </linearGradient>

    <filter id="woodGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.12" numOctaves="3" seed="19" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .22"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <radialGradient id="vinylFill" cx="42%" cy="35%" r="70%">
      <stop offset="0" stop-color="#28241f"/>
      <stop offset=".42" stop-color="#11100f"/>
      <stop offset=".78" stop-color="#070707"/>
      <stop offset="1" stop-color="#171411"/>
    </radialGradient>

    <radialGradient id="labelPaper" cx="45%" cy="38%" r="70%">
      <stop offset="0" stop-color="#f0dfb1"/>
      <stop offset=".62" stop-color="#d5bc82"/>
      <stop offset="1" stop-color="#af8d56"/>
    </radialGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b6258"/>
      <stop offset=".15" stop-color="#d6cec1"/>
      <stop offset=".34" stop-color="#8b8176"/>
      <stop offset=".55" stop-color="#efe9df"/>
      <stop offset=".78" stop-color="#776d63"/>
      <stop offset="1" stop-color="#c9bfb1"/>
    </linearGradient>

    <linearGradient id="darkMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33302c"/>
      <stop offset=".55" stop-color="#111"/>
      <stop offset="1" stop-color="#464038"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000" flood-opacity=".5"/>
    </filter>

    <filter id="fineShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".6"/>
    </filter>

    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="5" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .12"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <filter id="vinylSheen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <!-- LP groove pattern -->
    <pattern id="grooves" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="4.5" fill="none" stroke="#b9ad98" stroke-opacity=".08" stroke-width=".7"/>
    </pattern>

    <style>
      :root { --spin-duration: 1.8s; }
      #record-rotor { transform-box: fill-box; transform-origin: center; }
      #tonearm-rotor { transform-box: view-box; transform-origin: 1046px 143px; }
      #tonearm-lift { transform-box: fill-box; transform-origin: center; transition: transform .34s cubic-bezier(.2,.8,.2,1), filter .34s ease; }

      .is-playing #record-rotor {
        animation: spin var(--spin-duration) linear infinite;
      }
      .is-on-record #tonearm-rotor {
        transform: rotate(15deg);
      }
      .is-lifted #tonearm-lift {
        transform: translateY(-13px) rotate(-1.4deg);
        filter: drop-shadow(0 13px 8px rgba(0,0,0,.48));
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .ui-hidden .instruction { display: none; }
      text { user-select: none; }
    </style>
  </defs>

  <!-- ===== BODY / BASE ===== -->
  <g id="turntable-body">
    <rect x="36" y="24" width="1208" height="672" rx="40" fill="#160d09"/>
    <rect x="52" y="38" width="1176" height="644" rx="34" fill="url(#woodBase)" filter="url(#woodGrain)"/>
    <rect x="62" y="48" width="1156" height="624" rx="28" fill="none" stroke="#d0ad79" stroke-opacity=".42" stroke-width="3"/>
    <rect x="72" y="58" width="1136" height="604" rx="24" fill="none" stroke="#120b08" stroke-opacity=".85" stroke-width="4"/>
  </g>

  <!-- ===== PLATTER SHADOW ===== -->
  <circle cx="472" cy="334" r="286" fill="#000" opacity=".48" filter="url(#softShadow)"/>
  <circle cx="472" cy="334" r="281" fill="#35302a" stroke="#817566" stroke-width="5"/>
  <circle cx="472" cy="334" r="272" fill="#0a0908"/>

  <!-- ===== ROTATING RECORD: animate this group ===== -->
  <g id="record-rotor">
    <circle id="vinyl-disc" cx="472" cy="334" r="267" fill="url(#vinylFill)" stroke="#332d28" stroke-width="3"/>

    <!-- concentric grooves -->
    <g id="vinyl-grooves" fill="none" stroke="#a89d8e" stroke-opacity=".11">
      <circle cx="472" cy="334" r="250" stroke-width="1.1"/>
      <circle cx="472" cy="334" r="244" stroke-width=".7"/>
      <circle cx="472" cy="334" r="236" stroke-width=".9"/>
      <circle cx="472" cy="334" r="227" stroke-width=".65"/>
      <circle cx="472" cy="334" r="217" stroke-width=".8"/>
      <circle cx="472" cy="334" r="207" stroke-width=".7"/>
      <circle cx="472" cy="334" r="197" stroke-width=".8"/>
      <circle cx="472" cy="334" r="186" stroke-width=".65"/>
      <circle cx="472" cy="334" r="175" stroke-width=".8"/>
      <circle cx="472" cy="334" r="164" stroke-width=".7"/>
      <circle cx="472" cy="334" r="153" stroke-width=".8"/>
      <circle cx="472" cy="334" r="141" stroke-width=".7"/>
      <circle cx="472" cy="334" r="128" stroke-width=".9"/>
    </g>

    <!-- light streaks rotate with record -->
    <path d="M266 172 A266 266 0 0 1 658 118"
          fill="none" stroke="#f0dfc6" stroke-opacity=".11" stroke-width="13"
          stroke-linecap="round" filter="url(#vinylSheen)"/>
    <path d="M289 515 A255 255 0 0 0 634 547"
          fill="none" stroke="#d9c8ae" stroke-opacity=".08" stroke-width="9"
          stroke-linecap="round" filter="url(#vinylSheen)"/>

    <!-- Blank label for dynamic song title -->
    <g id="record-label">
      <circle cx="472" cy="334" r="88" fill="url(#labelPaper)" stroke="#9a7847" stroke-width="2" filter="url(#paperNoise)"/>
      <circle cx="472" cy="334" r="76" fill="none" stroke="#85673e" stroke-opacity=".72" stroke-width="1.4"/>
      <circle cx="472" cy="334" r="63" fill="none" stroke="#8d7046" stroke-opacity=".45" stroke-width=".8"/>
      <!-- intentionally blank track-title area -->
      <rect id="track-title-safe-area" x="405" y="302" width="134" height="64" rx="8"
            fill="#f4e5bf" fill-opacity=".18" stroke="#7e6138" stroke-opacity=".18"/>
      <circle cx="472" cy="334" r="7.2" fill="url(#metal)" stroke="#2d2822" stroke-width="2"/>
      <circle cx="472" cy="334" r="2.2" fill="#e9e0d4"/>
    </g>
  </g>

  <!-- ===== TONEARM ASSEMBLY: rotate around pivot ===== -->
  <g id="tonearm-rotor">
    <g id="tonearm-lift">
      <!-- pivot housing -->
      <g id="tonearm-base" filter="url(#fineShadow)">
        <circle cx="1046" cy="143" r="76" fill="#1b1917" stroke="#746b61" stroke-width="4"/>
        <circle cx="1046" cy="143" r="54" fill="url(#darkMetal)" stroke="#a69b8e" stroke-width="3"/>
        <circle cx="1046" cy="143" r="36" fill="url(#metal)" stroke="#3b3732" stroke-width="3"/>
        <circle cx="1046" cy="143" r="13" fill="#24211e" stroke="#b2a89c" stroke-width="3"/>
        <circle cx="1046" cy="143" r="5" fill="#d7cfc3"/>
      </g>

      <!-- counterweight -->
      <g id="counterweight" transform="rotate(-22 1046 143)" filter="url(#fineShadow)">
        <rect x="1037" y="52" width="18" height="78" rx="9" fill="url(#metal)" stroke="#322e2a" stroke-width="2"/>
        <ellipse cx="1046" cy="46" rx="33" ry="22" fill="url(#darkMetal)" stroke="#756c62" stroke-width="3"/>
      </g>

      <!-- arm tube -->
      <path id="tonearm-tube"
            d="M1028 161
               C995 190, 976 224, 953 265
               C915 333, 857 389, 786 429"
            fill="none" stroke="#28231f" stroke-width="17" stroke-linecap="round" opacity=".8"/>
      <path d="M1028 157
               C995 186, 976 220, 953 261
               C915 329, 857 385, 786 425"
            fill="none" stroke="url(#metal)" stroke-width="12" stroke-linecap="round"/>
      <path d="M1026 153
               C994 181, 975 216, 951 257
               C914 324, 856 380, 785 420"
            fill="none" stroke="#fff" stroke-opacity=".26" stroke-width="2.6" stroke-linecap="round"/>

      <!-- headshell -->
      <g id="headshell" transform="translate(770 412) rotate(-29)" filter="url(#fineShadow)">
        <rect x="0" y="0" width="105" height="32" rx="8" fill="url(#darkMetal)" stroke="#8c8277" stroke-width="2"/>
        <rect x="16" y="7" width="23" height="18" rx="3" fill="#4d4842" stroke="#c1b8ac" stroke-width="1"/>
        <circle cx="82" cy="16" r="5" fill="#c9bfb2"/>
        <path d="M84 29 L94 52" stroke="#1a1816" stroke-width="5" stroke-linecap="round"/>
        <path d="M94 52 L99 58" stroke="#d9983f" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- ===== LOWER CONTROL PANEL ===== -->
  <g id="control-panel" filter="url(#fineShadow)">
    <rect x="112" y="580" width="1056" height="82" rx="18" fill="url(#metal)" stroke="#3e3934" stroke-width="3"/>
    <rect x="124" y="592" width="1032" height="58" rx="12" fill="none" stroke="#f5eee4" stroke-opacity=".42"/>

    <g id="start-stop">
      <text x="520" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#211d1a">START / STOP</text>
      <rect x="472" y="618" width="96" height="28" rx="5" fill="url(#darkMetal)" stroke="#171513" stroke-width="2"/>
      <rect x="479" y="622" width="82" height="18" rx="3" fill="#80786e"/>
    </g>

    <g id="power-light">
      <text x="647" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#211d1a">POWER</text>
      <circle cx="647" cy="632" r="12" fill="#4f3b22"/>
      <circle cx="647" cy="632" r="7" fill="#ffc04d"/>
      <circle cx="647" cy="632" r="16" fill="#ffc04d" opacity=".22"/>
    </g>

    <g id="speed">
      <text x="842" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#211d1a">33⅓ RPM</text>
      <rect x="805" y="620" width="74" height="24" rx="4" fill="#171513"/>
      <rect x="811" y="625" width="42" height="14" rx="7" fill="#8d857a"/>
    </g>
  </g>

  </svg>
